<html lang="ja">
<head>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f0c29;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Hiragino Maru Gothic Pro', 'Hiragino Round Gothic Pro', 'M PLUS Rounded 1c', 'BIZ UDPGothic', sans-serif;
  overflow: hidden;
}
#mobile-shell { display: none; }
@media (max-width: 600px) {
  #desktop-layout { display: none !important; }
  #mobile-shell {
    display: flex;
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
    z-index: 10;
  }
}
.stage {
  display: flex;
  gap: 32px;
  align-items: flex-start;
  padding: 24px;
  overflow-x: auto;
}
.phone-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.screen-label {
  color: rgba(255,255,255,0.55);
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 600;
}
.phone {
  width: 375px;
  height: 812px;
  border-radius: 50px;
  background: #111;
  box-shadow: 0 0 0 3px #333, 0 0 0 6px #222, 0 40px 80px rgba(0,0,0,0.8), 0 0 60px rgba(100,80,255,0.2);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.phone-notch {
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 150px; height: 28px;
  background: #111;
  border-radius: 0 0 22px 22px;
  z-index: 100;
}
.phone-screen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border-radius: 50px;
  overflow: hidden;
}
.phone-home {
  position: absolute;
  bottom: 10px; left: 50%; transform: translateX(-50%);
  width: 130px; height: 5px;
  background: rgba(255,255,255,0.3);
  border-radius: 3px;
  z-index: 100;
}
/* Status bar */
.status-bar {
  height: 44px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 28px 6px;
  position: relative;
  z-index: 50;
}
.status-time { font-size: 15px; font-weight: 700; color: white; }
.status-icons { display: flex; gap: 6px; align-items: center; }

@keyframes popIn {
  0% { transform: scale(0.4) translateY(20px); opacity: 0; }
  60% { transform: scale(1.08) translateY(-3px); }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-70px) scale(1.4); }
}
@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,200,50,0.4); }
  50% { transform: scale(1.03); box-shadow: 0 0 0 8px rgba(255,200,50,0); }
}
@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes starPop {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  50% { transform: scale(1.3) rotate(10deg); opacity: 1; }

  50% { background-position: 100% 50%; }

@keyframes flashFadeOut { 0%{opacity:1;} 40%{opacity:.6;} 100%{opacity:0;} }

}

@keyframes barFillIn { from{width:0%;} to{width:71%;} }

<div id="root"></div>
<div id="mobile-shell"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── palette ── */
const CAT = {
  body:    { g: ['#FF6B6B','#FF8E53'], label:'身体系',  icon:'🏃' },
  create:  { g: ['#A18CD1','#FBC2EB'], label:'創作系',  icon:'🎨' },
  explore: { g: ['#43E97B','#38F9D7'], label:'探求系',  icon:'🔭' },
  social:  { g: ['#F093FB','#F5576C'], label:'交流系',  icon:'💬' },
  compete: { g: ['#4FACFE','#00F2FE'], label:'競技系',  icon:'🏆' },
};
window.CAT = CAT;

/* ════════════════════════════════════════
   PLAY-SCENE  (inlined from play-scene.jsx)
═══════════════════════════════════════════ */
const SCENE_CONFIG = {
  body:    { particles:['💦','💧','🌊'], label:'全力プレイ中…',      bg:'linear-gradient(175deg,#87CEEB 0%,#4FC3F7 45%,#0288D1 100%)', water:['rgba(3,169,244,0.7)','rgba(2,136,209,0.55)','rgba(1,87,155,0.4)'] },
  explore: { particles:['🦋','🍃','🌿'], label:'発見しまくり！',      bg:'linear-gradient(175deg,#C8E6C9 0%,#81C784 45%,#2E7D32 100%)',  water:['rgba(129,199,132,0.6)','rgba(56,142,60,0.45)','rgba(27,94,32,0.35)'] },
  compete: { particles:['⚡','✨','🎮'], label:'熱いバトル中！',       bg:'linear-gradient(175deg,#1a1a3e 0%,#4527A0 50%,#311B92 100%)',  water:['rgba(126,87,194,0.6)','rgba(94,53,177,0.5)','rgba(49,27,146,0.4)'] },
  create:  { particles:['⭐','✏️','🎨'], label:'集中して制作中！',    bg:'linear-gradient(175deg,#FFF8E1 0%,#FFE082 45%,#F57F17 100%)',  water:['rgba(255,204,128,0.6)','rgba(245,124,0,0.45)','rgba(230,81,0,0.35)'] },
  social:  { particles:['💬','😂','🎉'], label:'みんなで盛り上がり中！', bg:'linear-gradient(175deg,#FCE4EC 0%,#F48FB1 45%,#AD1457 100%)', water:['rgba(244,143,177,0.6)','rgba(240,98,146,0.5)','rgba(173,20,87,0.4)'] },
};

function XpFloat({ val, x }) {
  return <div style={{ position:'absolute', left:x, top:260, fontSize:22, fontWeight:900, color:'white', textShadow:'0 2px 8px rgba(0,0,0,0.4)', pointerEvents:'none', animation:'xpFloat 1.4s ease-out both', zIndex:30 }}>+{val} XP</div>;
}

function ProgressRing({ progress, color='white' }) {
  const r=52, circ=2*Math.PI*r, offset=circ*(1-progress/100);
  return (
    <svg width={130} height={130} viewBox="0 0 130 130" style={{ transform:'rotate(-90deg)' }}>
      <circle cx={65} cy={65} r={r} fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth={9}/>
      <circle cx={65} cy={65} r={r} fill="none" stroke={color} strokeWidth={9}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{ transition:'stroke-dashoffset 0.08s linear', filter:`drop-shadow(0 0 8px ${color})` }}/>
    </svg>
  );
}

function WaveBG({ colors }) {
  return (
    <div style={{ position:'absolute', bottom:0, left:0, right:0, height:220, overflow:'hidden' }}>
      {colors.map((col,i) => (
        <div key={i} style={{ position:'absolute', bottom:i*18, left:'-20%', width:'140%', height:130-i*10, background:col, borderRadius:'50% 50% 0 0/30% 30% 0 0', animation:`waveSway ${2.2+i*0.4}s ease-in-out ${i*0.35}s infinite` }}/>
      ))}
    </div>
  );
}

function PlayingScreen({ play, onComplete }) {
  const [progress, setProgress] = useState(0);
  const [floaters, setFloaters] = useState([]);
  const [phase, setPhase]       = useState('playing');
  const [totalXp, setTotalXp]   = useState(0);
  const doneRef = useRef(false);
  const cat   = play?.cat || 'body';
  const scene = SCENE_CONFIG[cat] || SCENE_CONFIG.body;
  const xpVals = [5,8,6,9,7,10,6];
  const DURATION = 3200;
  useEffect(() => {
    const start = Date.now(); let xpIdx=0, xpTotal=0;
    const prog = setInterval(() => {
      const pct = Math.min((Date.now()-start)/DURATION*100, 100);
      setProgress(pct);
      if (pct>=100 && !doneRef.current) { doneRef.current=true; clearInterval(prog); setPhase('complete'); setTimeout(()=>onComplete&&onComplete(),1000); }
    }, 30);
    const xpTick = setInterval(() => {
      if (xpIdx<xpVals.length) { const v=xpVals[xpIdx++]; xpTotal+=v; setTotalXp(xpTotal); setFloaters(p=>[...p,{id:Date.now(),val:v,x:60+Math.floor(Math.random()*180)}]); }
    }, 420);
    return () => { clearInterval(prog); clearInterval(xpTick); };
  }, []);
  const isLight = cat==='create'||cat==='explore';
  const skip = () => { if (!doneRef.current) { doneRef.current=true; setPhase('complete'); setTimeout(()=>onComplete&&onComplete(),600); } };
  return (
    <div onClick={skip} style={{ width:'100%', height:'100%', background:scene.bg, position:'relative', overflow:'hidden', display:'flex', flexDirection:'column', alignItems:'center', cursor:'pointer' }}>
      <div style={{ height:44, display:'flex', alignItems:'flex-end', justifyContent:'space-between', padding:'0 24px 6px', zIndex:50, width:'100%' }}>
        <span style={{ fontSize:15, fontWeight:700, color:isLight?'rgba(0,0,0,0.7)':'white' }}>9:41</span>
      </div>
      <div style={{ marginTop:10, animation:'fadeSlideUp 0.4s ease both', textAlign:'center' }}>
        <div style={{ fontSize:13, fontWeight:700, color:isLight?'rgba(0,0,0,0.55)':'rgba(255,255,255,0.7)', marginBottom:4, letterSpacing:'0.1em' }}>{scene.label}</div>
        <div style={{ fontSize:24, fontWeight:900, color:isLight?'#222':'white', textShadow:isLight?'none':'0 2px 12px rgba(0,0,0,0.3)' }}>{play?.name||'川遊び'}</div>
      </div>
      {floaters.map(f=><XpFloat key={f.id} val={f.val} x={f.x}/>)}
      <div style={{ marginTop:28, position:'relative', width:130, height:130 }}>
        <ProgressRing progress={progress} color={isLight?'rgba(0,0,0,0.6)':'white'}/>
        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:48, animation:'playBounce 0.6s ease-in-out infinite' }}>
          {phase==='complete'?'✅':(play?.icon||'🏊')}
        </div>
      </div>
      {phase==='complete'&&(
        <div style={{ position:'absolute', inset:0, background:'rgba(255,255,255,0.15)', display:'flex', alignItems:'center', justifyContent:'center', animation:'flashIn 0.3s ease both', zIndex:40 }}>
          <div style={{ fontSize:42, fontWeight:900, color:'white', textShadow:'0 0 30px rgba(255,255,255,0.8)', animation:'popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both', letterSpacing:'0.05em' }}>COMPLETE!</div>
        </div>
      )}
      <div style={{ marginTop:14, background:'rgba(255,255,255,0.2)', backdropFilter:'blur(8px)', borderRadius:20, padding:'8px 20px', border:'1px solid rgba(255,255,255,0.35)', animation:'fadeSlideUp 0.5s ease 0.3s both' }}>
        <span style={{ fontSize:13, fontWeight:700, color:isLight?'#444':'rgba(255,255,255,0.8)' }}>獲得 XP </span>
        <span style={{ fontSize:20, fontWeight:900, color:isLight?'#222':'white' }}>{totalXp}</span>
      </div>
      {scene.particles.map((p,i)=>(
        <div key={i} style={{ position:'absolute', top:80+i*90, left:[30,280,150][i], fontSize:22, opacity:0.45, animation:`particleDrift ${3+i*0.7}s ease-in-out ${i*0.5}s infinite` }}>{p}</div>
      ))}
      <WaveBG colors={scene.water}/>
      {phase==='playing'&&(
        <div style={{ position:'absolute', bottom:36, left:0, right:0, textAlign:'center', animation:'fadeSlideUp 0.5s ease 1s both' }}>
          <span style={{ fontSize:11, color:isLight?'rgba(0,0,0,0.4)':'rgba(255,255,255,0.4)', letterSpacing:'0.1em' }}>タップでスキップ</span>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════
   RESULT-ENHANCED  (inlined from result-enhanced.jsx)
═══════════════════════════════════════════ */
function useCountUp(target, duration, startDelay) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let raf, timeout;
    timeout = setTimeout(() => {
      const start = Date.now();
      const tick = () => {
        const t = Math.min((Date.now()-start)/duration, 1);
        const eased = t===1 ? 1 : 1-Math.pow(2,-10*t);
        setVal(Math.round(eased*target));
        if (t<1) raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
    }, startDelay);
    return () => { clearTimeout(timeout); cancelAnimationFrame(raf); };
  }, [target]);
  return val;
}

const CONFETTI_PIECES = [
  {x:18,delay:.00,speed:2.4,rot:15,  col:'#FFD700',w:12,h:6},{x:55, delay:.05,speed:2.7,rot:-35,col:'#FF6B9D',w:8, h:8},
  {x:90,delay:.10,speed:2.2,rot:60,  col:'#4FACFE',w:10,h:5},{x:130,delay:.02,speed:2.9,rot:-20,col:'#43E97B',w:9, h:9},
  {x:170,delay:.15,speed:2.5,rot:80, col:'#F093FB',w:11,h:5},{x:210,delay:.07,speed:2.3,rot:-55,col:'#FFD700',w:7, h:7},
  {x:250,delay:.12,speed:2.8,rot:30, col:'#FF6B9D',w:12,h:6},{x:290,delay:.04,speed:2.6,rot:-70,col:'#4FACFE',w:8, h:8},
  {x:330,delay:.18,speed:2.4,rot:45, col:'#43E97B',w:10,h:5},{x:360,delay:.08,speed:2.9,rot:-10,col:'#F093FB',w:9, h:6},
  {x:35, delay:.22,speed:2.3,rot:25, col:'#FF8E53',w:11,h:5},{x:75, delay:.30,speed:2.7,rot:-45,col:'#FFD700',w:8, h:8},
  {x:115,delay:.25,speed:2.5,rot:70, col:'#4FACFE',w:12,h:6},{x:155,delay:.35,speed:2.4,rot:-30,col:'#FF6B9D',w:7, h:7},
  {x:195,delay:.20,speed:2.8,rot:55, col:'#43E97B',w:10,h:5},{x:235,delay:.28,speed:2.6,rot:-65,col:'#F093FB',w:9, h:9},
  {x:275,delay:.33,speed:2.3,rot:10, col:'#FFD700',w:11,h:5},{x:315,delay:.15,speed:2.9,rot:-40,col:'#FF8E53',w:8, h:6},
  {x:348,delay:.40,speed:2.5,rot:85, col:'#4FACFE',w:10,h:8},{x:10, delay:.45,speed:2.7,rot:-15,col:'#FF6B9D',w:7, h:5},
];

function Confetti() {
  return (
    <div style={{ position:'absolute', inset:0, pointerEvents:'none', overflow:'hidden', zIndex:5 }}>
      {CONFETTI_PIECES.map((p,i)=>(
        <div key={i} style={{ position:'absolute', top:-20, left:p.x, width:p.w, height:p.h, background:p.col, borderRadius:p.w===p.h?'50%':2, transform:`rotate(${p.rot}deg)`, animation:`confettiFall ${p.speed}s cubic-bezier(0.25,0.46,0.45,0.94) ${p.delay}s both` }}/>
      ))}
    </div>
  );
}

function AnimXpBar({ cat, lv, pct, delay }) {
  const [filled, setFilled] = useState(false);
  const c = CAT[cat];
  useEffect(() => { const t=setTimeout(()=>setFilled(true),delay); return ()=>clearTimeout(t); }, []);
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
      <div style={{ width:30, height:30, borderRadius:9, background:`linear-gradient(135deg,${c.g[0]},${c.g[1]})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:15, flexShrink:0, boxShadow:`0 2px 8px ${c.g[0]}88` }}>{c.icon}</div>
      <div style={{ flex:1 }}>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:3 }}>
          <span style={{ fontSize:11, fontWeight:700, color:'rgba(255,255,255,0.85)' }}>{c.label}</span>
          <span style={{ fontSize:11, fontWeight:800, color:'white' }}>Lv.{lv}</span>
        </div>
        <div style={{ height:7, background:'rgba(255,255,255,0.15)', borderRadius:4, overflow:'hidden', position:'relative' }}>
          <div style={{ height:'100%', borderRadius:4, background:`linear-gradient(90deg,${c.g[0]},${c.g[1]})`, width:filled?`${pct}%`:'0%', transition:filled?'width 0.9s cubic-bezier(0.34,1.3,0.64,1)':'none', boxShadow:filled?`0 0 10px ${c.g[0]}`:'' }}/>
          {filled&&<div style={{ position:'absolute', inset:0, background:'linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.35) 50%,transparent 100%)', backgroundSize:'200% 100%', animation:'shimmer 1.5s ease 0.5s both' }}/>}
        </div>
      </div>
    </div>
  );
}

function LvUpBurst({ catG }) {
  return (
    <>
      <div style={{ position:'absolute', inset:0, zIndex:20, background:'rgba(255,200,0,0.18)', animation:'goldTint 1.2s ease 0.3s both', pointerEvents:'none' }}/>
      {[...Array(8)].map((_,i)=>(
        <div key={i} style={{ position:'absolute', top:'38%', left:'50%', width:3, height:80, background:`linear-gradient(to bottom,${catG[0]},transparent)`, transformOrigin:'top center', transform:`translateX(-50%) rotate(${i*45}deg)`, animation:'rayBurst 0.8s ease 0.4s both', zIndex:18, pointerEvents:'none' }}/>
      ))}
    </>
  );
}

function ResultScreen({ play, onNext }) {
  const catKey = play?.cat||'body';
  const c = CAT[catKey];
  const xp1 = useCountUp(28, 900, 800);
  const xp2 = useCountUp(10, 700, 1000);
  return (
    <div style={{ width:'100%', height:'100%', background:`linear-gradient(175deg,${c.g[0]} 0%,${c.g[1]} 55%,#1a1a3e 100%)`, position:'relative', display:'flex', flexDirection:'column', alignItems:'center', overflowY:'hidden' }}>
      <div style={{ position:'absolute', inset:0, zIndex:100, background:'white', animation:'flashFadeOut 0.5s ease both', pointerEvents:'none' }}/>
      <Confetti/>
      <LvUpBurst catG={c.g}/>
      <div style={{ height:44, display:'flex', alignItems:'flex-end', padding:'0 24px 6px', zIndex:50, width:'100%', flexShrink:0 }}>
        <span style={{ fontSize:15, fontWeight:700, color:'white' }}>9:41</span>
      </div>
      <div style={{ marginTop:10, zIndex:10, animation:'iconPulseIn 0.65s cubic-bezier(0.34,1.56,0.64,1) 0.15s both', flexShrink:0 }}>
        <div style={{ width:108, height:108, borderRadius:36, background:'rgba(255,255,255,0.28)', backdropFilter:'blur(10px)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:54, border:'3px solid rgba(255,255,255,0.55)', boxShadow:'0 8px 40px rgba(0,0,0,0.25)' }}>{play?.icon||'🏊'}</div>
      </div>

/* ────────────────────────────────────────────
   APP ROOT
──────────────────────────────────────────── */
const SCREENS = [
  { id:'main',    label:'① メイン画面',  desc:'HUD・ライフステージ' },
  { id:'select',  label:'② 遊び選択',    desc:'カード式セレクション' },
  { id:'playing', label:'③ 遊び中',      desc:'アクション演出' },
  { id:'result',  label:'④ 遊び結果',    desc:'XP演出・レベルアップ' },
  { id:'album',   label:'⑤ アルバム',    desc:'遊び履歴フィード' },
  { id:'status',  label:'⑥ ステータス',  desc:'パラメーター詳細' },
];

/* ── shell shared by all phones ── */
function PhoneShell({ children, glow = 'rgba(120,80,255,0.18)' }) {
  return (
    <div style={{ width:375, height:812, borderRadius:50, background:'#111', boxShadow:`0 0 0 3px #2a2a2a, 0 0 0 6px #1a1a1a, 0 50px 100px rgba(0,0,0,0.85), 0 0 80px ${glow}`, position:'relative', overflow:'hidden', flexShrink:0 }}>
      <div style={{ position:'absolute', left:-3, top:140, width:4, height:36, background:'#2a2a2a', borderRadius:'2px 0 0 2px' }}/>
      <div style={{ position:'absolute', left:-3, top:185, width:4, height:60, background:'#2a2a2a', borderRadius:'2px 0 0 2px' }}/>
      <div style={{ position:'absolute', left:-3, top:255, width:4, height:60, background:'#2a2a2a', borderRadius:'2px 0 0 2px' }}/>
      <div style={{ position:'absolute', right:-3, top:175, width:4, height:80, background:'#2a2a2a', borderRadius:'0 2px 2px 0' }}/>
      <div style={{ position:'absolute', top:0, left:0, right:0, bottom:0, borderRadius:50, overflow:'hidden' }}>{children}</div>
      <div style={{ position:'absolute', top:0, left:'50%', transform:'translateX(-50%)', width:130, height:26, background:'#111', borderRadius:'0 0 20px 20px', zIndex:200 }}/>
      <div style={{ position:'absolute', bottom:10, left:'50%', transform:'translateX(-50%)', width:134, height:5, background:'rgba(255,255,255,0.25)', borderRadius:3, zIndex:200 }}/>
    </div>
  );
}

/* ── interactive flow phone (left-most) ── */
function InteractivePhone() {
  const [screen, setScreen] = useState('main');
  const [play, setPlay] = useState(PLAYS[0]);
  const [playKey, setPlayKey] = useState(0);

  const goSelect  = ()  => setScreen('select');
  const goPlaying = (p) => { setPlay(p); setPlayKey(k => k+1); setScreen('playing'); };
  const goResult  = ()  => setScreen('result');
  const goSelect2 = ()  => setScreen('select');
  const goMain    = ()  => setScreen('main');

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:14, flexShrink:0 }}>
      <div style={{ textAlign:'center' }}>
        <div style={{ fontSize:13, fontWeight:800, color:'rgba(255,255,255,0.95)', letterSpacing:'0.02em' }}>🎮 インタラクティブ体験</div>
        <div style={{ fontSize:11, color:'rgba(255,255,255,0.45)', marginTop:2 }}>遊び選択 → 遊び中 → 結果 を体験</div>
      </div>
      <PhoneShell glow="rgba(255,107,157,0.35)">
        {screen === 'main'    && <MainScreen onPlay={goSelect}/>}
        {screen === 'select'  && <PlaySelectScreen onSelect={goPlaying} onBack={goMain}/>}
        {screen === 'playing' && <PlayingScreen key={playKey} play={play} onComplete={goResult}/>}
        {screen === 'result'  && <ResultScreen key={playKey + 'r'} play={play} onNext={goSelect2}/>}
      </PhoneShell>
      <div style={{ display:'flex', gap:5, flexWrap:'wrap', justifyContent:'center', maxWidth:360 }}>
        {['main','select','playing','result'].map(s => (
          <button key={s} onClick={() => setScreen(s)} style={{ fontSize:10, padding:'4px 10px', borderRadius:20, border:'1px solid rgba(255,255,255,0.2)', background: screen===s ? 'rgba(255,107,157,0.65)' : 'rgba(255,255,255,0.08)', color:'rgba(255,255,255,0.85)', cursor:'pointer', fontWeight: screen===s ? 800 : 500 }}>{s}</button>
        ))}
      </div>
    </div>
  );
}

function StaticPhone({ screenId }) {
  const [selectedPlay] = useState(PLAYS[0]);
  return (
    <PhoneShell>
      {screenId === 'main'    && <MainScreen/>}
      {screenId === 'select'  && <PlaySelectScreen onSelect={() => {}}/>}
      {screenId === 'playing' && <PlayingScreen play={selectedPlay}/>}
      {screenId === 'result'  && <ResultScreen play={selectedPlay}/>}
      {screenId === 'album'   && <AlbumScreen/>}
      {screenId === 'status'  && <StatusScreen/>}
    </PhoneShell>
  );
}

function App() {
  return (
    <div style={{ display:'flex', gap:28, padding:'32px 28px', overflowX:'auto', minHeight:'100vh', alignItems:'flex-start', justifyContent:'center' }}>
      <InteractivePhone/>
      {SCREENS.map(s => (
        <div key={s.id} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:14, flexShrink:0 }}>
          <div style={{ textAlign:'center' }}>
            <div style={{ fontSize:13, fontWeight:800, color:'rgba(255,255,255,0.85)', letterSpacing:'0.02em' }}>{s.label}</div>
            <div style={{ fontSize:11, color:'rgba(255,255,255,0.4)', marginTop:2 }}>{s.desc}</div>
          </div>
          <StaticPhone screenId={s.id}/>
        </div>
      ))}
    </div>
  );
}

/* ── Mobile: single full-screen interactive phone ── */
function MobileApp() {
  const [screen, setScreen] = React.useState('main');
  const [play, setPlay]     = React.useState(PLAYS[0]);
  const [playKey, setPlayKey] = React.useState(0);
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const scale = Math.min(vw / 375, vh / 812);

  const goSelect  = ()  => setScreen('select');
  const goPlaying = (p) => { setPlay(p); setPlayKey(k=>k+1); setScreen('playing'); };
  const goResult  = ()  => setScreen('result');
  const goSelect2 = ()  => setScreen('select');
  const goMain    = ()  => setScreen('main');

  return (
    <div style={{ width:'100vw', height:'100vh', display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden' }}>
      <div style={{ transform:`scale(${scale})`, transformOrigin:'center center', width:375, height:812, borderRadius:50, background:'#111', boxShadow:'0 0 0 3px #2a2a2a, 0 0 0 6px #1a1a1a, 0 30px 60px rgba(0,0,0,0.8), 0 0 60px rgba(255,107,157,0.3)', position:'relative', flexShrink:0 }}>
        <div style={{ position:'absolute', left:-3, top:140, width:4, height:36, background:'#2a2a2a', borderRadius:'2px 0 0 2px' }}/>
        <div style={{ position:'absolute', left:-3, top:185, width:4, height:60, background:'#2a2a2a', borderRadius:'2px 0 0 2px' }}/>
        <div style={{ position:'absolute', right:-3, top:175, width:4, height:80, background:'#2a2a2a', borderRadius:'0 2px 2px 0' }}/>
        <div style={{ position:'absolute', top:0, left:0, right:0, bottom:0, borderRadius:50, overflow:'hidden' }}>
          {screen==='main'    && <MainScreen onPlay={goSelect}/>}
          {screen==='select'  && <PlaySelectScreen onSelect={goPlaying} onBack={goMain}/>}
          {screen==='playing' && <PlayingScreen key={playKey} play={play} onComplete={goResult}/>}
          {screen==='result'  && <ResultScreen key={playKey+'r'} play={play} onNext={goSelect2}/>}
        </div>
        <div style={{ position:'absolute', top:0, left:'50%', transform:'translateX(-50%)', width:130, height:26, background:'#111', borderRadius:'0 0 20px 20px', zIndex:200 }}/>
        <div style={{ position:'absolute', bottom:10, left:'50%', transform:'translateX(-50%)', width:134, height:5, background:'rgba(255,255,255,0.25)', borderRadius:3, zIndex:200 }}/>
      </div>
    </div>
  );
}

const rootEl = document.getElementById('root');
const mobileEl = document.getElementById('mobile-shell');
ReactDOM.createRoot(rootEl).render(<div id="desktop-layout"><App/></div>);
if (mobileEl) ReactDOM.createRoot(mobileEl).render(<MobileApp/>);
</script>
